[project]
name = "db"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "sqlalchemy==2.0.50",
    "alembic==1.18.4",
    "psycopg2-binary==2.9.12",
]

[tool.setuptools.packages.find]
where = ["src"]

[build-system]
requires = ["setuptools>=70"]
build-backend = "setuptools.build_meta"
